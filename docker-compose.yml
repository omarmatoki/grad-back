version: '3.8'

services:
  # MongoDB Database
  mongodb:
    image: mongo:7
    container_name: social-impact-mongodb
    restart: always
    environment:
      MONGO_INITDB_ROOT_USERNAME: admin
      MONGO_INITDB_ROOT_PASSWORD: secure_password_change_me
      MONGO_INITDB_DATABASE: social-impact-platform
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db
      - mongodb_config:/data/configdb
    networks:
      - social-impact-network
    healthcheck:
      test: echo 'db.runCommand("ping").ok' | mongosh localhost:27017/test --quiet
      interval: 10s
      timeout: 10s
      retries: 5
      start_period: 40s

  # NestJS Backend API
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: social-impact-backend
    restart: always
    ports:
      - "3000:3000"
    environment:
      NODE_ENV: production
      PORT: 3000
      MONGODB_URI: mongodb://admin:secure_password_change_me@mongodb:27017/social-impact-platform?authSource=admin
      JWT_SECRET: your-super-secret-jwt-key-change-in-production
      JWT_EXPIRATION: 7d
      N8N_WEBHOOK_URL: http://n8n:5678/webhook/analyze-impact
      N8N_TIMEOUT: 60000
    depends_on:
      mongodb:
        condition: service_healthy
    networks:
      - social-impact-network
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:3000/api/v1/health', (r) => {process.exit(r.statusCode === 200 ? 0 : 1)})"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 40s

  # n8n Workflow Automation
  n8n:
    image: n8nio/n8n:latest
    container_name: social-impact-n8n
    restart: always
    ports:
      - "5678:5678"
    environment:
      - N8N_BASIC_AUTH_ACTIVE=true
      - N8N_BASIC_AUTH_USER=admin
      - N8N_BASIC_AUTH_PASSWORD=n8n_secure_password
      - WEBHOOK_URL=http://localhost:5678
      - GENERIC_TIMEZONE=Asia/Riyadh
    volumes:
      - n8n_data:/home/node/.n8n
      - ./n8n-workflow-example.json:/home/node/.n8n/workflows/social-impact.json:ro
    networks:
      - social-impact-network
    depends_on:
      - ollama

  # Ollama for LLaMA AI
  ollama:
    image: ollama/ollama:latest
    container_name: social-impact-ollama
    restart: always
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    networks:
      - social-impact-network
    # For GPU support, uncomment below (requires NVIDIA Docker runtime)
    # deploy:
    #   resources:
    #     reservations:
    #       devices:
    #         - driver: nvidia
    #           count: 1
    #           capabilities: [gpu]

  # Mongo Express (MongoDB Web UI - Development Only)
  mongo-express:
    image: mongo-express:latest
    container_name: social-impact-mongo-express
    restart: always
    ports:
      - "8081:8081"
    environment:
      ME_CONFIG_MONGODB_ADMINUSERNAME: admin
      ME_CONFIG_MONGODB_ADMINPASSWORD: secure_password_change_me
      ME_CONFIG_MONGODB_URL: mongodb://admin:secure_password_change_me@mongodb:27017/
      ME_CONFIG_BASICAUTH_USERNAME: admin
      ME_CONFIG_BASICAUTH_PASSWORD: admin
    depends_on:
      mongodb:
        condition: service_healthy
    networks:
      - social-impact-network
    profiles:
      - dev # Only start with: docker-compose --profile dev up

networks:
  social-impact-network:
    driver: bridge

volumes:
  mongodb_data:
    driver: local
  mongodb_config:
    driver: local
  n8n_data:
    driver: local
  ollama_data:
    driver: local
